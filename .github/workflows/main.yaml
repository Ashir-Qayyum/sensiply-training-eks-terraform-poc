name: CI/CD for SMS Application

on:

  push:
    branches:
      - main

jobs:

  build-backend:

    runs-on: arc-runner-set

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

    #   - name: Configure AWS Credentials
    #     uses: aws-actions/configure-aws-credentials@v4
    #     with:
    #       aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
    #       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    #       aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Backend Image
        run: |

          docker build -t ashirqayyum/sms-backend:eks-terraform .

      - name: Push Backend Image
        run: |

          docker push ashirqayyum/sms-backend:eks-terraform

  build-frontend:

    runs-on: arc-runner-set

    needs: build-backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Frontend Image
        run: |

          docker build -t ashirqayyum/sms-frontend:eks-terraform ./src/frontend

      - name: Push Frontend Image
        run: |

          docker push ashirqayyum/sms-frontend:eks-terraform

  deploy:

    runs-on: arc-runner-set

    needs:

      - build-backend
      - build-frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |

          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name sensiply-training-cluster

      - name: Create Namespace
        run: |

          kubectl create namespace sms || true
          # This will pass the command if the namespace already existed in the cluster

      - name: Deploy Backend
        run: |

          helm upgrade --install backend \
            ./helm/sms-backend \
            --namespace sms \
            --set database.password="${{ secrets.MYSQL_PASSWORD }}"

          kubectl rollout restart deployment/backend -n sms
          kubectl rollout status deployment/backend -n sms

      - name: Deploy Frontend
        run: |

          helm upgrade --install frontend \
            ./helm/sms-frontend \
            --namespace sms
            
          kubectl rollout restart deployment/frontend -n sms  
          kubectl rollout status deployment/frontend -n sms

