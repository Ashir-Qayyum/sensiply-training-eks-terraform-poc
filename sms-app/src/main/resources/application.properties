server.error.include-message=always
server.error.include-binding-errors=always


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true


# For RDS MySQL:




spring.datasource.url=jdbc:mysql://localhost:3306/student       # db name: student
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=admin                                # username: admin
# spring.datasource.password=""     Since the startup.sh script will inject the password by exporting



spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
